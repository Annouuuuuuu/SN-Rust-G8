[watch]
directories = [
    'C:\Users\DELL\Documents',
    'C:\Users\DELL\Desktop',
]
polling_interval_ms = 500

[sync]
destination = 'C:\SAUVEGARDE'
create_backups = true
max_concurrent_operations = 4

[filters]
exclude_patterns = [
    "**/AppData/**",
    "**/Application Data/**",
    "**/Cookies/**",
    "**/Local Settings/**",
    "**/Recent/**",
    "**/SendTo/**",
    "**/Start Menu/**",
    "**/Templates/**",
    "**/NTUSER.DAT*",
    "**/ntuser.dat*",
    "**/ntuser.ini",
    "**/desktop.ini",
    "**/Thumbs.db",
    "**/$RECYCLE.BIN/**",
    "**/System Volume Information/**",
    "**/*.tmp",
    "**/*.temp",
    "**/~$*",
    "**/*.swp",
    "**/*.swo",
    "**/*~",
    "**/Google/Chrome/User Data/*/Cache/**",
    "**/Mozilla/Firefox/Profiles/*/cache2/**",
    "**/MicrosoftEdge/User Data/*/Cache/**",
    "**/OneDrive/**",
    "**/node_modules/**",
    "**/.git/**",
    "**/target/**",
    "**/vendor/**",
    "**/__pycache__/**",
    "**/*.pyc",
    "**/build/**",
    "**/dist/**",
    "**/*.log",
    "**/logs/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/*.sublime-workspace",
]
max_file_size_mb = 100
include_extensions = []

[reporting]
show_progress = true
log_file = 'C:\SAUVEGARDE\filesentinel.log'

[versioning]
enabled = true
max_versions = 10
versions_dir = 'C:\SAUVEGARDE\.versions'
auto_version_on_change = true

[compression]
enabled = true
level = 6
min_file_size_for_compression = 10240

[notifications]
enabled = true
show_batch_summary = true
min_interval_seconds = 15
critical_patterns = [
    "*.docx",
    "*.xlsx",
    "*.pptx",
    "*.pdf",
    "*.odt",
    "*.ods",
    "*.odp",
    "*.pst",
    "*.ost",
    "*.db",
    "*.sqlite",
    "*.sql",
    "*.conf",
    "*.config",
    "*.ini",
    "*.xml",
    "*.json",
    "*.yaml",
    "*.yml",
    "*.env",
    "*.toml",
    "*.cfg",
    "*.lock",
    "*.key",
    "*.pem",
    "*.cert",
    "*.crt",
    "*.p12",
    "*.pfx",
    "*.zip",
    "*.tar",
    "*.gz",
    "*.7z",
    "*.rar",
]
